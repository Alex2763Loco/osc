<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOTOSC!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ENCABEZADO -->
  <header>
    <div class="logo-container">
      <img src="pato.png" alt="Mascota Pato WOTOSC" class="pato-mascota">
      <div class="title-group">
        <h1>WOTOSC!</h1>
        <p class="subtitle">¡El archivo definitivo de la OSC!</p>
      </div>
    </div>
  </header>

  <!-- BARRA DE BÚSQUEDA Y FILTROS -->
  <main class="container">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Buscar series...">
    </div>

    <div class="filter-tags" id="filterContainer">
      <button class="tag active" data-show="all">Todos</button>
      <button class="tag" data-show="fav">⭐ Favoritos</button>
      <button class="tag" data-show="BFDI">BFDI</button>
      <button class="tag" data-show="II">II</button>
      <button class="tag" data-show="ONE">ONE</button>
      <button class="tag" data-show="AB">AB</button>
      <button class="tag" data-show="TNM">TNM</button>
      <button class="tag" data-show="BS">BS</button>
      <button class="tag" data-show="OF">OF</button>
      <button class="tag" data-show="ITFT">ITFT</button>
    </div>

    <!-- GRILLA DE EPISODIOS -->
    <div class="episodes-grid" id="episodesGrid">
      <!-- Los episodios se cargan dinámicamente desde app.js -->
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
