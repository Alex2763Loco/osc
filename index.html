<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WOTOSC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Encabezado con Botón de Modo Claro/Oscuro -->
  <header>
    <div class="header-top">
      <h1>WOTOSC!</h1>
      <button id="theme-toggle" class="theme-btn">☀️ Modo Claro</button>
    </div>
    <p>¡El archivo definitivo de la OSC!!!</p>
  </header>

  <!-- Contenedor de Búsqueda y Filtros -->
  <div class="controls-container">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="🔍 Buscar series">
    </div>

<div class="filter-container">
  <button class="filter-btn active" data-show="all">Todos</button>
  <button class="filter-btn favorites-btn" data-show="favs">★ Favoritos</button>
  <button class="filter-btn" data-show="BFDI">BFDI</button>
  <button class="filter-btn" data-show="II">II</button>
  <button class="filter-btn" data-show="ONE">ONE</button>
  <button class="filter-btn" data-show="AB">AB</button>
  <button class="filter-btn" data-show="TNM">TNM</button>
  <button class="filter-btn" data-show="BS">BS</button>
  <button class="filter-btn" data-show="OF">OF</button>
  <button class="filter-btn" data-show="ITFT">ITFT</button>
</div>

  <!-- Contenedor dinámico -->
  <main id="episodes-container" class="grid-container">
    <!-- JS insertará las tarjetas aquí -->
  </main>

  <script src="app.js"></script>
</body>
</html>
