<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSC Archive</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Encabezado -->
  <header>
    <h1>OSC Video Archive</h1>
    <p>¡El archivo definitivo de BFDI, II, ONE, Animatic Battle y más!</p>
  </header>

  <!-- Filtros por Show -->
  <div class="filter-container">
    <button class="filter-btn active" data-show="all">Todos</button>
    <button class="filter-btn" data-show="BFDI">BFDI</button>
    <button class="filter-btn" data-show="II">II</button>
    <button class="filter-btn" data-show="ONE">ONE</button>
    <button class="filter-btn" data-show="AB">AB</button>
    <button class="filter-btn" data-show="TNM">TNM</button>
  </div>

  <!-- Contenedor dinámico -->
  <main id="episodes-container" class="grid-container">
    <!-- JS insertará las tarjetas aquí -->
  </main>

  <script src="app.js"></script>
</body>
</html>
